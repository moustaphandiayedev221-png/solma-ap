name: colways
description: Application e-commerce premium de chaussures - Flutter + Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # State & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Supabase
  supabase_flutter: ^2.8.0

  # Connexion native iOS (Google & Apple)
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # UI & animations
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  video_player: ^2.9.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.1.0
  photo_view: ^0.14.0
  google_fonts: ^6.1.0

  # Utils
  crypto: ^3.0.3
  http: ^1.2.2
  connectivity_plus: ^6.0.5
  equatable: ^2.0.5
  url_launcher: ^6.2.5
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  intl: ^0.20.2
  country_code_picker: ^3.4.1
  country_state_city: ^0.1.6
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Payment (Stripe)
  flutter_stripe: ^11.2.0

  # Push notifications (système en premier plan et arrière-plan)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^17.2.3

# Évite le crash "DOBJC_initializeApi" sur simulateur iOS 26.x (path_provider_foundation 2.5+ utilise objective_c/FFI)
dependency_overrides:
  path_provider_foundation: 2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # build_runner / riverpod_generator optionnels pour code gen
  # build_runner: ^2.4.13
  # riverpod_generator: ^2.6.3
  # custom_lint: ^0.7.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
